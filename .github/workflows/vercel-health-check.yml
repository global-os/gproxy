name: Vercel Health Check

on:
  deployment_status:
  workflow_dispatch:
    inputs:
      deployment_url:
        description: Deployment URL to check (without trailing slash)
        required: true
        type: string

jobs:
  health:
    name: GET /health
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' || github.event.deployment_status.state == 'success'
    steps:
      - name: Resolve deployment URL
        id: deployment
        run: |
          if [ -n "${{ github.event.inputs.deployment_url }}" ]; then
            RAW="${{ github.event.inputs.deployment_url }}"
          else
            RAW="${{ github.event.deployment_status.environment_url }}"
          fi
          [[ "$RAW" == https://* ]] || RAW="https://${RAW}"
          echo "url=$RAW" >> "$GITHUB_OUTPUT"

      - name: Check /health
        id: check
        run: |
          set -euo pipefail
          BASE="${{ steps.deployment.outputs.url }}"
          echo "Checking ${BASE}/health"

          for i in $(seq 1 12); do
            BODY_FILE="$(mktemp)"
            HTTP_CODE=$(curl -sS -L --max-time 30 \
            -H "x-vercel-protection-bypass: ${{ secrets.VERCEL_AUTOMATION_BYPASS_SECRET }}" \
            -o "$BODY_FILE" -w "%{http_code}" "${BASE}/health")
            echo "Attempt ${i}: HTTP ${HTTP_CODE}"

            if [ "$HTTP_CODE" = "200" ] && jq -e '.status == "ok" and .database.ok == true' "$BODY_FILE" > /dev/null 2>&1; then
              echo "Health check passed"
              exit 0
            fi

            cat "$BODY_FILE"
            [ "$i" -lt 12 ] && echo "Retrying in 10s..." && sleep 10
          done

          echo "Health check failed after 12 attempts"
          exit 1
