<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Fastmail</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { height: 100%; background: #1a1a2e; }
    #root { height: 100%; display: flex; flex-direction: column; align-items: center; justify-content: center; }
    #webview-frame { width: 100%; height: 100%; border: none; display: none; }
    #loading { display: flex; flex-direction: column; align-items: center; gap: 16px; }
    #loading svg { width: 48px; height: 48px; }
    #loading-msg { color: #9ba3b8; font: 13px/1.5 -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
    #error-msg { color: #e05c5c; font: 13px/1.5 -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; display: none; }
  </style>
</head>
<body>
  <div id="root">
    <div id="loading">
      <svg viewBox="0 0 48 48" xmlns="http://www.w3.org/2000/svg">
        <rect width="48" height="48" rx="10" fill="#2B68EB"/>
        <path d="M8 14h32v20a2 2 0 0 1-2 2H10a2 2 0 0 1-2-2V14z" fill="none" stroke="#fff" stroke-width="2.2"/>
        <polyline points="8,14 24,27 40,14" fill="none" stroke="#fff" stroke-width="2.2" stroke-linejoin="round"/>
      </svg>
      <span id="loading-msg">Connecting to Fastmail…</span>
      <span id="error-msg"></span>
    </div>
    <iframe id="webview-frame" title="Fastmail" allow="autoplay; clipboard-read; clipboard-write"></iframe>
  </div>
  <script src="messaging.js"></script>
  <script src="app.js"></script>
</body>
</html>
