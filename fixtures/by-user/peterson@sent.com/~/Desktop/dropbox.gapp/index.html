<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dropbox</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { height: 100%; background: #111; }
    #root { height: 100%; display: flex; flex-direction: column; align-items: center; justify-content: center; }
    #webview-frame { width: 100%; height: 100%; border: none; display: none; }
    #loading { display: flex; flex-direction: column; align-items: center; gap: 16px; }
    #loading svg { width: 48px; height: 48px; }
    #loading-msg { color: #aaa; font: 13px/1.5 -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
    #error-msg { color: #e05c5c; font: 13px/1.5 -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; display: none; }
  </style>
</head>
<body>
  <div id="root">
    <div id="loading">
      <svg viewBox="0 0 48 48" xmlns="http://www.w3.org/2000/svg">
        <polygon points="12,8 24,16 12,24 0,16" fill="#0061FF" transform="translate(12,4)"/>
        <polygon points="0,8 12,16 0,24 -12,16" fill="#0061FF" transform="translate(24,4)"/>
        <polygon points="0,0 12,8 0,16 -12,8" fill="#0061FF" transform="translate(12,28)"/>
        <polygon points="0,0 12,-8 24,0 12,8" fill="#0061FF" transform="translate(12,36)"/>
      </svg>
      <span id="loading-msg">Connecting to Dropbox…</span>
      <span id="error-msg"></span>
    </div>
    <iframe id="webview-frame" title="Dropbox" allow="autoplay; clipboard-read; clipboard-write"></iframe>
  </div>
  <script src="messaging.js"></script>
  <script src="app.js"></script>
</body>
</html>
